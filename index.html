<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquareC — підбір образу</title>
<style>
  :root{
    --black:#111113;
    --charcoal:#2a2a2d;
    --midgray:#7c7c81;
    --lightgray:#d7d6d3;
    --paper:#efeeea;
    --white:#ffffff;
    --line:#c9c8c4;
    --shadow: 0 18px 40px rgba(0,0,0,0.18);
  }

  *{box-sizing:border-box;}

  html,body{margin:0;padding:0;}

  body{
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color:var(--black);
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px),
      radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1.4px);
    background-size: 44px 44px, 44px 44px, 44px 44px;
    background-position: -1px -1px, -1px -1px, 21px 21px;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    background:var(--black);
    color:var(--white);
    padding:22px 20px;
    text-align:center;
    position:relative;
    overflow:hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  .topbar::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:3px;
    background:repeating-linear-gradient(90deg, var(--white) 0 10px, transparent 10px 20px);
    opacity:0.5;
  }
  .wordmark{
    font-family: Arial Black, Arial, sans-serif; font-weight:900;
    font-size:clamp(28px, 6vw, 44px);
    letter-spacing:6px;
    display:inline-flex;
    align-items:center;
    gap:14px;
    text-transform:uppercase;
  }
  .wordmark .star{
    display:inline-block;
    font-size:0.7em;
    animation: spin-slow 6s linear infinite;
    transform-origin:center;
  }
  @keyframes spin-slow{
    from{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(180deg) scale(1.15);}
    to{transform:rotate(360deg) scale(1);}
  }
  .subtag{
    font-family: 'Courier New', monospace;
    font-size:11px;
    letter-spacing:3px;
    color:var(--lightgray);
    text-transform:uppercase;
    margin-top:6px;
  }

  /* ---------- SECTIONS ---------- */
  .wrap{
    max-width:900px;
    margin:0 auto;
    padding:50px 20px 30px;
  }

  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:26px;
    border-bottom:2px solid var(--black);
    padding-bottom:10px;
  }
  .section-title{
    font-family: Arial Black, Arial, sans-serif; font-weight:900;
    font-size:26px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .section-counter{
    font-family: 'Courier New', monospace;
    font-size:14px;
    color:var(--midgray);
    letter-spacing:1px;
  }

  .stage{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin-bottom:22px;
  }

  .arrow-btn{
    background:var(--black);
    color:var(--white);
    border:none;
    width:48px;
    height:48px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition: transform 0.18s ease, background 0.18s ease;
    box-shadow: var(--shadow);
  }
  .arrow-btn:hover{
    background:var(--charcoal);
    transform:scale(1.12);
  }
  .arrow-btn:active{
    transform:scale(0.92);
  }

  .card-scene{
    perspective:1400px;
    width:280px;
    height:340px;
    flex-shrink:0;
  }
  .card-inner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
    border-radius:14px;
    box-shadow: var(--shadow);
  }
  .card-inner.flipped{
    transform: rotateY(180deg);
  }
  .card-inner.bump{
    animation: bump 0.35s ease;
  }
  @keyframes bump{
    0%{transform-origin:center; }
    50%{ filter:brightness(1.06); }
  }
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:14px;
    overflow:hidden;
    background:var(--white);
    border:2px solid var(--black);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card-face img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-face.back{
    transform: rotateY(180deg);
  }
  .face-tag{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--black);
    color:var(--white);
    font-family: 'Courier New', monospace;
    font-size:10px;
    letter-spacing:2px;
    padding:4px 9px;
    border-radius:20px;
    text-transform:uppercase;
    z-index:2;
  }

  .dots{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:6px;
  }
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--lightgray);
    border:1px solid var(--midgray);
    cursor:pointer;
    transition: all 0.2s ease;
    padding:0;
  }
  .dot.active{
    background:var(--black);
    transform:scale(1.3);
  }
  .dot:hover{
    background:var(--midgray);
  }

  hr.divider{
    border:none;
    border-top:2px dashed var(--midgray);
    margin:50px 0 40px;
  }

  /* ---------- NOTE BOX ---------- */
  .note-box{
    background:var(--white);
    border:2px solid var(--white);
    outline:2px solid var(--black);
    outline-offset:-8px;
    border-radius:10px;
    max-width:520px;
    margin:10px auto 60px;
    padding:22px 26px;
    box-shadow: var(--shadow);
    text-align:center;
  }
  .note-box .note-title{
    font-family: 'Courier New', monospace;
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--midgray);
    margin-bottom:14px;
  }
  .note-line{
    font-size:14.5px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:10px 0;
    font-weight:500;
  }
  .note-line .glyph{
    font-size:18px;
  }

  @media (max-width:520px){
    .card-scene{width:220px; height:270px;}
    .stage{gap:10px;}
    .wordmark{letter-spacing:3px;}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="wordmark"><span class="star">★</span>SquareC</div>
    <div class="subtag">---</div>
  </div>

  <div class="wrap">

    <!-- ===================== FUTBOLKI ===================== -->
    <section id="tshirts-section">
      <div class="section-head">
        <div class="section-title">Футболки</div>
        <div class="section-counter" id="tshirt-counter">01 / 09</div>
      </div>

      <div class="stage">
        <button class="arrow-btn" onclick="prevItem('tshirt')" aria-label="Попередня футболка">&#8592;</button>
        <div class="card-scene">
          <div class="card-inner" id="tshirt-card" onclick="flipCard('tshirt')">
            <div class="card-face front">
              <span class="face-tag">перед</span>
              <img id="tshirt-front-img" alt="Футболка, вид спереду">
            </div>
            <div class="card-face back">
              <span class="face-tag">зад</span>
              <img id="tshirt-back-img" alt="Футболка, вид ззаду">
            </div>
          </div>
        </div>
        <button class="arrow-btn" onclick="nextItem('tshirt')" aria-label="Наступна футболка">&#8594;</button>
      </div>

      <div class="dots" id="tshirt-dots"></div>
    </section>

    <!-- ===================== SHORTS ===================== -->
    <section id="shorts-section">
      <div class="section-head">
        <div class="section-title">Шорти</div>
        <div class="section-counter" id="shorts-counter">01 / 05</div>
      </div>

      <div class="stage">
        <button class="arrow-btn" onclick="prevItem('shorts')" aria-label="Попередні шорти">&#8592;</button>
        <div class="card-scene">
          <div class="card-inner" id="shorts-card" onclick="flipCard('shorts')">
            <div class="card-face front">
              <span class="face-tag">перед</span>
              <img id="shorts-front-img" alt="Шорти, вид спереду">
            </div>
            <div class="card-face back">
              <span class="face-tag">зад</span>
              <img id="shorts-back-img" alt="Шорти, вид ззаду">
            </div>
          </div>
        </div>
        <button class="arrow-btn" onclick="nextItem('shorts')" aria-label="Наступні шорти">&#8594;</button>
      </div>

      <div class="dots" id="shorts-dots"></div>
    </section>
    <hr class="divider">

    <!-- ===================== NOTE ===================== -->
    <div class="note-box">
      <div class="note-title">---</div>
      <div class="note-line"><span class="glyph">&#8592; &#8594;</span> стрілочки для навігації</div>
      <div class="note-line"><span class="glyph">&#8635;</span> клік на фото для зміни сторони</div>
    </div>

  </div>

<script>
  // ---------- CONFIG ----------
  // Просто поклади свої фото у папку "photos" поряд з index.html
  // з такими іменами файлів (формат: jpg, png, webp — онови розширення нижче за потреби)
  const EXT = "jpg"; // якщо фото .png або .jpeg — зміни тут

  const state = {
    tshirt: { count: 9, index: 0, flipped: false },
    shorts: { count: 5, index: 0, flipped: false }
  };

  function photoPath(category, index, side){
    return `photos/${category}_${index + 1}_${side}.${EXT}`;
  }

  function placeholderSVG(category, index, side){
    const label = category === 'tshirt' ? 'Футболка' : 'Шорти';
    const bg = side === 'front' ? '%23f0efea' : '%23e2e0da';
    const svg = `data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='280' height='340'>
        <rect width='100%25' height='100%25' fill='${bg}'/>
        <line x1='0' y1='0' x2='280' y2='340' stroke='%23111113' stroke-opacity='0.06' stroke-width='2'/>
        <line x1='280' y1='0' x2='0' y2='340' stroke='%23111113' stroke-opacity='0.06' stroke-width='2'/>
        <text x='50%25' y='45%25' font-family='monospace' font-size='16' fill='%23111113' text-anchor='middle'>${label} ${index + 1}</text>
        <text x='50%25' y='55%25' font-family='monospace' font-size='13' fill='%237c7c81' text-anchor='middle'>вид: ${side === 'front' ? 'перед' : 'зад'}</text>
        <text x='50%25' y='90%25' font-family='monospace' font-size='9' fill='%237c7c81' text-anchor='middle'>photos/${category}_${index+1}_${side}.${EXT}</text>
      </svg>`;
    return svg.replace(/\n/g,'').replace(/\s+/g,' ');
  }

  function setImage(imgEl, category, index, side){
    imgEl.src = photoPath(category, index, side);
    imgEl.onerror = () => {
      imgEl.onerror = null;
      imgEl.src = placeholderSVG(category, index, side);
    };
  }

  function buildDots(category){
    const dotsWrap = document.getElementById(`${category}-dots`);
    dotsWrap.innerHTML = "";
    for(let i = 0; i < state[category].count; i++){
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === state[category].index ? ' active' : '');
      dot.setAttribute('aria-label', `Перейти до ${i+1}`);
      dot.onclick = () => goToIndex(category, i);
      dotsWrap.appendChild(dot);
    }
  }

  function refreshCounter(category){
    const el = document.getElementById(`${category}-counter`);
    const s = state[category];
    const pad = n => String(n).padStart(2, '0');
    el.textContent = `${pad(s.index + 1)} / ${pad(s.count)}`;
  }

  function renderItem(category, { skipFlipReset } = {}){
    const s = state[category];
    setImage(document.getElementById(`${category}-front-img`), category, s.index, 'front');
    setImage(document.getElementById(`${category}-back-img`), category, s.index, 'back');
    refreshCounter(category);
    buildDots(category);

    const card = document.getElementById(`${category}-card`);
    if(!skipFlipReset){
      s.flipped = false;
      card.classList.remove('flipped');
    }
  }

  function nextItem(category){
    const s = state[category];
    s.index = (s.index + 1) % s.count;
    bumpCard(category);
    renderItem(category);
  }

  function prevItem(category){
    const s = state[category];
    s.index = (s.index - 1 + s.count) % s.count;
    bumpCard(category);
    renderItem(category);
  }

  function goToIndex(category, i){
    state[category].index = i;
    bumpCard(category);
    renderItem(category);
  }

  function bumpCard(category){
    const card = document.getElementById(`${category}-card`);
    card.classList.remove('bump');
    void card.offsetWidth; // restart animation
    card.classList.add('bump');
  }

  function flipCard(category){
    const s = state[category];
    s.flipped = !s.flipped;
    const card = document.getElementById(`${category}-card`);
    card.classList.toggle('flipped', s.flipped);
  }

  // init
  renderItem('tshirt', { skipFlipReset: true });
  renderItem('shorts', { skipFlipReset: true });
</script>

</body>
</html>
